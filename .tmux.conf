# ==========================================
# General Settings
# ==========================================

# Enable mouse support for switching panes and resizing
set -g mouse on

# Start window and pane numbering at 1 for easier keyboard access
set -g base-index 1
set -g pane-base-index 1

# Use Vim mode for both status line and copy mode
set -g mode-keys vi
set-window-option -g mode-keys vi

# ==========================================
# Automation & Path Management
# ==========================================

# Update status line every 5 seconds
set-option -g status-interval 5

# Automatically rename windows based on current directory
set-option -g automatic-rename on
# Show only the last part of the current path
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Open new windows and panes in the current directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ==========================================
# Pane & Window Navigation
# ==========================================

# Navigate panes using Vim keys (hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes using Ctrl + Vim keys (hjkl)
bind-key -r C-h resize-pane -L 5
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-l resize-pane -R 5

# Quick switch to last window or pane
bind W last-window
bind P last-pane

# Swap window positions with < and >
bind-key < swap-window -t -1\; select-window -t -1
bind-key > swap-window -t +1\; select-window -t +1

# ==========================================
# Copy Mode (Vim Style)
# ==========================================

# Keybindings for selection in copy mode
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# ==========================================
# Advanced Features
# ==========================================

# Centered popup window (Prefix + Ctrl-p)
bind C-p display-popup -d "#{pane_current_path}" -E -w 90% -h 90%

# Quickly create a new named session
bind S command-prompt -p "New Session Name: " "new-session -s '%%'"

# ==========================================
# Plugins
# ==========================================

# Plugin to sync tmux copy buffer with system clipboard
set -g @plugin 'tmux-plugins/tmux-yank'
